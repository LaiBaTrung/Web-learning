<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="form-card">
      <h5>Đăng ký tài khoản</h5>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username*</label>
          <input
            type="text"
            class="form-control"
            placeholder="Choose your username"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Company name*</label>
          <input
            type="text"
            class="form-control"
            placeholder="your company name"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">E-mail*</label>
          <input
            type="email"
            class="form-control"
            placeholder="Your current email address"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Category*</label>
          <input
            type="text"
            class="form-control"
            placeholder="skills catagory"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Password*</label>
          <input
            type="password"
            class="form-control"
            placeholder="Create a password"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Contact number*</label>
          <input
            type="tel"
            class="form-control"
            placeholder="provide your number"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Full name*</label>
          <input
            type="text"
            class="form-control"
            placeholder="Your First name and Last name"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Your Location*</label>
          <input
            type="text"
            class="form-control"
            placeholder="Your Pincode and City"
          />
        </div>

        <div class="col-md-6">
          <label class="form-label d-block">Gender*</label>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="gender"
              id="male"
              value="male"
            />
            <label class="form-check-label" for="male">Male</label>
          </div>
          <div class="form-check form-check-inline">
            <input
              class="form-check-input"
              type="radio"
              name="gender"
              id="female"
              value="female"
            />
            <label class="form-check-label" for="female">Female</label>
          </div>
        </div>

        <div class="col-md-6 d-flex align-items-center">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agreeF1" />
            <label
              class="form-check-label"
              for="agreeF1"
              style="font-size: 13px"
            >
              Agree with the terms and conditions
            </label>
          </div>
        </div>

        <div
          class="col-12 d-flex align-items-center gap-2 justify-content-end mt-2"
        >
          <button class="btn-signup">Signup</button>
          <span class="or-text">or</span>
          <button class="btn-facebook">Sign Up with Facebook</button>
        </div>
      </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
  </body>
</html>
