<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="card-table">
      <table class="table mb-0">
        <thead>
          <tr>
            <th style="width: 35%">Name</th>
            <th style="width: 25%">Title</th>
            <th style="width: 15%">Status</th>
            <th style="width: 15%">Position</th>
            <th style="width: 10%">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Row 1 -->
          <tr>
            <td>
              <div class="d-flex align-items-center gap-3">
                <img src="../img/anh1.png" alt="John Doe" class="avatar" />
                <div class="name-block">
                  <div class="name">John Doe</div>
                  <div class="email">john.doe@gmail.com</div>
                </div>
              </div>
            </td>
            <td>
              <div class="title-block">
                <div class="job">Software engineer</div>
                <div class="dept">IT department</div>
              </div>
            </td>
            <td><span class="badge-active">Active</span></td>
            <td>Senior</td>
            <td><button class="btn-edit">Edit</button></td>
          </tr>

          <!-- Row 2 -->
          <tr>
            <td>
              <div class="d-flex align-items-center gap-3">
                <img src="../img/anh2.png" alt="Alex Ray" class="avatar" />
                <div class="name-block">
                  <div class="name">Alex Ray</div>
                  <div class="email">alex.ray@gmail.com</div>
                </div>
              </div>
            </td>
            <td>
              <div class="title-block">
                <div class="job">Consultant</div>
                <div class="dept">Finance</div>
              </div>
            </td>
            <td><span class="badge-onboarding">Onboarding</span></td>
            <td>Junior</td>
            <td><button class="btn-edit">Edit</button></td>
          </tr>

          <!-- Row 3 -->
          <tr>
            <td>
              <div class="d-flex align-items-center gap-3">
                <img
                  src="../img/anh3.png"
                  alt="Kate Hunington"
                  class="avatar"
                />
                <div class="name-block">
                  <div class="name">Kate Hunington</div>
                  <div class="email">kate.hunington@gmail.com</div>
                </div>
              </div>
            </td>
            <td>
              <div class="title-block">
                <div class="job">Designer</div>
                <div class="dept">UI/UX</div>
              </div>
            </td>
            <td><span class="badge-awaiting">Awaiting</span></td>
            <td>Senior</td>
            <td><button class="btn-edit">Edit</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
  </body>
</html>
