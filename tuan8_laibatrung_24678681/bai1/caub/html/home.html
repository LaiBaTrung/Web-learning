<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Facebook – Đăng ký</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #dfe3ee;
        min-height: 100vh;
      }

      .navbar {
        background: #3b5998;
        padding: 6px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .navbar .logo {
        color: #fff;
        font-size: 1.8rem;
        font-weight: bold;
        font-family: Georgia, serif;
      }

      .navbar .nav-right {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        font-size: 0.72rem;
        color: #fff;
      }

      .navbar .nav-right .field {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .navbar .nav-right input[type="text"],
      .navbar .nav-right input[type="password"] {
        border: none;
        padding: 4px 6px;
        font-size: 0.8rem;
        width: 145px;
        border-radius: 2px;
      }

      .navbar .nav-right .hint {
        color: #aec4e5;
        font-size: 0.65rem;
      }

      .navbar .nav-right .remember {
        display: flex;
        align-items: center;
        gap: 3px;
        color: #aec4e5;
        font-size: 0.65rem;
      }

      .navbar .btn-login {
        background: #4c69ba;
        color: #fff;
        border: 1px solid #2f477a;
        padding: 5px 12px;
        border-radius: 3px;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        align-self: flex-end;
      }

      .main {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 30px 20px;
        gap: 40px;
      }

      .left {
        padding-top: 10px;
      }

      .left img {
        width: 300px;
        display: block;
        margin-right: 400px;
      }

      .left .thank-you {
        font-size: 1.5rem;
        font-weight: bold;
        color: #3b5998;
        line-height: 1.3;
        margin-top: 14px;
      }

      .form-card {
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        padding: 18px 20px 20px;
        width: 300px;
        flex-shrink: 0;
      }

      .form-card h2 {
        font-size: 1.5rem;
        color: #1c1e21;
        margin-bottom: 2px;
      }

      .form-card p {
        font-size: 0.78rem;
        font-weight: bold;
        color: #606770;
        margin-bottom: 12px;
      }

      .row-2 {
        display: flex;
        gap: 6px;
        margin-bottom: 0;
      }

      .row-2 input {
        width: 50%;
      }

      .form-card input[type="text"],
      .form-card input[type="email"],
      .form-card input[type="password"],
      .form-card input[type="number"] {
        width: 100%;
        border: 1px solid #ccd0d5;
        border-radius: 4px;
        padding: 8px 10px;
        font-size: 0.85rem;
        margin-bottom: 4px;
        background: #f5f6f7;
        outline: none;
      }

      .form-card input:focus {
        border-color: #3b5998;
        background: #fff;
      }

      input.error {
        border-color: red;
        background: #fff5f5;
      }
      input.ok {
        border-color: #42b72a;
      }

      .msg {
        color: red;
        font-size: 0.7rem;
        display: none;
        margin-bottom: 4px;
      }

      .btn-register {
        width: 100%;
        background: #42b72a;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 9px;
        font-size: 0.95rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 4px;
      }

      .btn-register:hover {
        background: #36a51e;
      }

      .success {
        display: none;
        background: #e6f4ea;
        color: #256029;
        border: 1px solid #42b72a;
        border-radius: 4px;
        padding: 8px;
        text-align: center;
        font-size: 0.82rem;
        margin-top: 8px;
      }

      footer {
        padding: 6px 16px;
        font-size: 0.78rem;
        font-weight: bold;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">facebook</div>
      <div class="nav-right">
        <div class="field">
          Email hoặc điện thoại
          <input type="text" />
          <span class="remember"
            ><input type="checkbox" /> Duy trì đăng nhập</span
          >
        </div>
        <div class="field">
          Mật khẩu
          <input type="password" />
          <span class="hint">Quên mật khẩu?</span>
        </div>
        <button class="btn-login">Đăng nhập</button>
      </div>
    </div>

    <div class="main">
      <div class="left">
        <img src="../img/facebook.png" alt="Facebook" />
        <div class="thank-you">Cảm ơn bạn<br />đã ghé thăm!</div>
      </div>

      <div class="form-card">
        <h2>Đăng ký</h2>
        <p>Miễn phí và sẽ luôn như vậy.</p>

        <div class="row-2">
          <input type="text" id="txtHo" placeholder="Họ" />
          <input type="text" id="txtTen" placeholder="Tên" />
        </div>
        <div class="row-2">
          <span class="msg" id="errHo"></span>
          <span class="msg" id="errTen"></span>
        </div>

        <input type="email" id="txtEmail" placeholder="Email đăng nhập" />
        <span class="msg" id="errEmail"></span>

        <input type="email" id="txtEmail2" placeholder="Nhập lại Email." />
        <span class="msg" id="errEmail2"></span>

        <input type="password" id="txtMK" placeholder="Mật khẩu" />
        <span class="msg" id="errMK"></span>

        <input type="number" id="txtNamSinh" placeholder="Năm sinh" />
        <span class="msg" id="errNamSinh"></span>

        <button class="btn-register" id="btnDangKy">Đăng ký</button>
        <div class="success" id="successMsg">
          🎉 Đăng ký tài khoản thành công!
        </div>
      </div>
    </div>

    <footer>Chúng tôi mong sớm gặp lại bạn.</footer>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script>
      $(function () {
        function validate(id, errId, checkFn) {
          var val = $("#" + id)
            .val()
            .trim();
          var result = checkFn(val);
          if (result === true) {
            $("#" + id)
              .removeClass("error")
              .addClass("ok");
            $("#" + errId).hide();
            return true;
          } else {
            $("#" + id)
              .removeClass("ok")
              .addClass("error");
            $("#" + errId)
              .text(result)
              .show();
            return false;
          }
        }

        function checkHo(v) {
          if (!v) return "Vui lòng nhập Họ";
          if (
            !/^[A-ZÁÀẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬĐÉÈẺẼẸÊẾỀỂỄỆÍÌỈĨỊÓÒỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÚÙỦŨỤƯỨỪỬỮỰÝỲỶỸỴ]/u.test(
              v,
            )
          )
            return "Họ phải bắt đầu bằng chữ hoa";
          return true;
        }

        function checkTen(v) {
          if (!v) return "Vui lòng nhập Tên";
          if (
            !/^[A-ZÁÀẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬĐÉÈẺẼẸÊẾỀỂỄỆÍÌỈĨỊÓÒỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÚÙỦŨỤƯỨỪỬỮỰÝỲỶỸỴ]/u.test(
              v,
            )
          )
            return "Tên phải bắt đầu bằng chữ hoa";
          return true;
        }

        function checkEmail(v) {
          if (!v) return "Vui lòng nhập Email";
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v))
            return "Email không đúng định dạng";
          return true;
        }

        function checkEmail2(v) {
          if (!v) return "Vui lòng nhập lại Email";
          if (v !== $("#txtEmail").val().trim())
            return "Email nhập lại không khớp";
          return true;
        }

        function checkMK(v) {
          if (!v) return "Vui lòng nhập mật khẩu";
          if (!/^(?=.*[a-zA-Z])(?=.*[0-9]).{6,}$/.test(v))
            return "Tối thiểu 6 ký tự, gồm cả chữ và số";
          return true;
        }

        function checkNamSinh(v) {
          if (!v) return "Vui lòng nhập năm sinh";
          if (isNaN(v) || parseInt(v) >= 2002)
            return "Năm sinh phải nhỏ hơn 2002";
          return true;
        }

        $("#txtHo").blur(function () {
          validate("txtHo", "errHo", checkHo);
        });
        $("#txtTen").blur(function () {
          validate("txtTen", "errTen", checkTen);
        });
        $("#txtEmail").blur(function () {
          validate("txtEmail", "errEmail", checkEmail);
        });
        $("#txtEmail2").blur(function () {
          validate("txtEmail2", "errEmail2", checkEmail2);
        });
        $("#txtMK").blur(function () {
          validate("txtMK", "errMK", checkMK);
        });
        $("#txtNamSinh").blur(function () {
          validate("txtNamSinh", "errNamSinh", checkNamSinh);
        });

        $("#btnDangKy").click(function () {
          var ok = [
            validate("txtHo", "errHo", checkHo),
            validate("txtTen", "errTen", checkTen),
            validate("txtEmail", "errEmail", checkEmail),
            validate("txtEmail2", "errEmail2", checkEmail2),
            validate("txtMK", "errMK", checkMK),
            validate("txtNamSinh", "errNamSinh", checkNamSinh),
          ].every(Boolean);

          if (ok) {
            $("#successMsg").fadeIn(300);
          } else {
            $("#successMsg").hide();
          }
        });
      });
    </script>
  </body>
</html>
