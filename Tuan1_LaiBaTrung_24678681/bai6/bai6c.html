<!doctype html>
<html>
  <head>
    <title>Form Date</title>
  </head>

  <body>
    <h3>Date</h3>

    <form style="width: 320px; border: 1px solid #5aa9ff; padding: 15px">
      <label>Name:</label><br />
      <input type="text" style="width: 100%" /><br /><br />

      <label>Telephone Number:</label><br />
      <input type="tel" style="width: 100%" /><br /><br />

      <label>Email:</label><br />
      <input type="email" style="width: 100%" /><br /><br />

      <label>Favorite Color:</label><br />
      <input type="color" /><br /><br />

      <label>Date of Birth:</label><br />
      <input type="date" value="2015-07-16" style="width: 100%" /><br /><br />

      <center>
        <input type="submit" value="Submit" />
      </center>
    </form>
  </body>
</html>
