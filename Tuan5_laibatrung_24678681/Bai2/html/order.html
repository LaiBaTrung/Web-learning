<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feane - Order</title>
    <link rel="icon" href="../images/favicon.png" />
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../css/fontawesome.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid px-4">
        <a class="brand" href="../html/home.html">Feane</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav mx-auto gap-1">
            <li class="nav-item">
              <a class="nav-link" href="../html/home.html">HOME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../html/menu.html">MENU</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../html/about.html">ABOUT</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../html/book.html">BOOK TABLE</a>
            </li>
          </ul>
          <a href="../html/order.html" class="btn-order-online">Order Online</a>
        </div>
      </div>
    </nav>

    <section class="hero-section px-4 px-md-5" style="filter: brightness(0.4)">
      <div class="hero-content ms-md-4">
        <h1 class="hero-title">Fast Food Restaurant</h1>
        <p class="hero-desc">
          Donec quam felis, ultricies nec, pellentesque eu, pretium quis, sem.
          Nulla consequat massa quis enim. Donec pede justo, fringilla vel.
        </p>
        <a href="#" class="btn-explore">Explore Menu</a>
      </div>
    </section>

    <div class="order-backdrop" id="orderBackdrop"></div>

    <div class="order-modal" id="orderModal">
      <div class="order-modal-header">
        <h5>Order</h5>
        <button class="btn-close-modal" id="btnCloseModal" title="Close">
          &#x2715;
        </button>
      </div>
      <div class="order-form">
        <label class="form-label">Telephone</label>
        <input type="tel" class="form-control" placeholder="" />
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="" />
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="checkMe" />
          <label
            class="form-check-label"
            for="checkMe"
            style="font-size: 0.85rem"
            >Check me out</label
          >
        </div>
      </div>
      <div class="order-modal-footer">
        <button class="btn-order-confirm">Order</button>
        <button class="btn-close-order" id="btnClose">Close</button>
      </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script>
      function closeModal() {
        window.location.href = "../html/home.html";
      }
      document.getElementById("btnClose").addEventListener("click", closeModal);
      document
        .getElementById("btnCloseModal")
        .addEventListener("click", closeModal);
      document
        .getElementById("orderBackdrop")
        .addEventListener("click", closeModal);
    </script>
  </body>
</html>
