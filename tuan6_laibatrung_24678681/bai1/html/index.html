<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sách Sinh Viên</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 30px;
        background: #f0f0f0;
      }

      .container {
        background: white;
        border: 1px solid #ccc;
        padding: 20px;
        min-width: 400px;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
      }

      h2 {
        text-align: center;
        color: #cc0000;
        font-size: 16px;
        margin: 4px 0;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      table,
      th,
      td {
        border: 1px solid #333;
      }

      th,
      td {
        padding: 8px 16px;
        text-align: center;
        font-size: 14px;
      }

      .btn {
        margin-top: 16px;
        padding: 8px 18px;
        background: #1a6bb5;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      .btn:hover {
        background: #155a99;
      }

      #tableArea {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="tableArea">
        <table>
          <thead>
            <tr>
              <th colspan="3"><h2>DANH SÁCH SINH VIÊN</h2></th>
            </tr>
            <tr>
              <th>MSSV</th>
              <th>Tên</th>
              <th>Lớp</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <br />
      <button class="btn" onclick="nhapThongTin()">
        Nhập thông tin sinh viên
      </button>
    </div>

    <script>
      function nhapThongTin() {
        var mssv = prompt("Nhập mã số SV:");
        if (mssv === null || mssv.trim() === "") {
          alert("Bạn chưa nhập mã số SV!");
          return;
        }

        var ten = prompt("Nhập họ tên:");
        if (ten === null || ten.trim() === "") {
          alert("Bạn chưa nhập họ tên!");
          return;
        }

        var lop = prompt("Nhập lớp:");
        if (lop === null || lop.trim() === "") {
          alert("Bạn chưa nhập lớp!");
          return;
        }

        var tbody = document.getElementById("tableBody");
        var row = document.createElement("tr");
        row.innerHTML =
          "<td>" +
          mssv +
          "</td>" +
          "<td>" +
          ten +
          "</td>" +
          "<td>" +
          lop +
          "</td>";
        tbody.appendChild(row);

        document.getElementById("tableArea").style.display = "block";
      }
    </script>
  </body>
</html>
