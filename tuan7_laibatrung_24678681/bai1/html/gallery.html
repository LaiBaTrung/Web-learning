<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 1 - Animal Gallery</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <style>
      body {
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
        padding: 30px;
      }

      h4 {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 6px;
      }

      p.mo-ta {
        font-size: 15px;
        margin-bottom: 20px;
      }

      .gallery-wrapper {
        border: 1px solid #aaa;
        border-radius: 6px;
        padding: 16px 20px;
        background-color: #fff;
        display: inline-block;
        width: 100%;
        max-width: 660px;
      }

      .gallery-title {
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 12px;
        color: #333;
      }

      .gallery-item {
        text-align: center;
        padding: 6px;
        border-right: 1px solid #ccc;
        border-bottom: 1px solid #ccc;
      }

      .gallery-item:nth-child(3n) {
        border-right: none;
      }

      .gallery-item:nth-last-child(-n + 3) {
        border-bottom: none;
      }

      .gallery-item img {
        width: 100%;
        height: 170px;
        object-fit: cover;
        display: block;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      .gallery-item img:hover {
        opacity: 0.85;
      }

      .gallery-item p {
        margin: 6px 0 0;
        font-size: 15px;
        color: #222;
      }

      #lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      #lightbox.show {
        display: flex;
      }

      #lightbox img {
        max-width: 80%;
        max-height: 80%;
        border: 4px solid #fff;
        border-radius: 4px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      }

      #lightbox .close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 36px;
        color: #fff;
        cursor: pointer;
        font-weight: bold;
        line-height: 1;
      }

      #lightbox .close-btn:hover {
        color: #f66;
      }
    </style>
  </head>
  <body>
    <div class="gallery-wrapper">
      <div class="gallery-title">Animal Gallery</div>

      <div class="row g-0" id="gallery">
        <!-- Lion -->
        <div class="col-4 gallery-item">
          <img src="../img/lion.jpg" alt="Lion" data-name="Lion" />
          <p>Lion</p>
        </div>
        <!-- Cat -->
        <div class="col-4 gallery-item">
          <img src="../img/cat.jpg" alt="Cat" data-name="Cat" />
          <p>Cat</p>
        </div>
        <!-- Bird -->
        <div class="col-4 gallery-item">
          <img src="../img/bird.jpg" alt="Bird" data-name="Bird" />
          <p>Bird</p>
        </div>
        <!-- Rhino -->
        <div class="col-4 gallery-item">
          <img src="../img/Rhino.jpg" alt="Rhino" data-name="Rhino" />
          <p>Rhino</p>
        </div>
        <!-- Panda -->
        <div class="col-4 gallery-item">
          <img src="../img/panda.jpg" alt="Panda" data-name="Panda" />
          <p>Panda</p>
        </div>
        <!-- Sheep / Goat -->
        <div class="col-4 gallery-item">
          <img src="../img/sheep.jpg" alt="Goat" data-name="Goat" />
          <p>Goat</p>
        </div>
      </div>
    </div>

    <div id="lightbox">
      <span class="close-btn" id="closeBtn">&times;</span>
      <img id="lightbox-img" src="" alt="" />
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        // Khi click vào ảnh → mở lightbox
        $("#gallery img").on("click", function () {
          var src = $(this).attr("src");
          var name = $(this).data("name");

          $("#lightbox-img").attr("src", src).attr("alt", name);
          $("#lightbox").addClass("show");
        });

        $("#closeBtn").on("click", function () {
          $("#lightbox").removeClass("show");
        });

        $("#lightbox").on("click", function (e) {
          if ($(e.target).is("#lightbox")) {
            $("#lightbox").removeClass("show");
          }
        });
      });
    </script>
  </body>
</html>
